<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="32" cy="32" r="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <rect width="64" height="64" rx="14" fill="url(#glow)"/>

  <g stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Center hub -->
    <circle cx="32" cy="32" r="4.2" fill="#ffffff" stroke="none"/>
    <!-- Three orbiting nodes representing protocol endpoints -->
    <circle cx="32" cy="14" r="3" fill="#ffffff" stroke="none"/>
    <circle cx="48" cy="40" r="3" fill="#ffffff" stroke="none"/>
    <circle cx="16" cy="40" r="3" fill="#ffffff" stroke="none"/>
    <!-- Connections -->
    <line x1="32" y1="17" x2="32" y2="28"/>
    <line x1="35.4" y1="34" x2="45" y2="39"/>
    <line x1="28.6" y1="34" x2="19" y2="39"/>
  </g>
</svg>
